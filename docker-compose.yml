version: '3.8'

services:
  # PocketBase - SQLite database with REST API
  pocketbase:
    image: ghcr.io/pocketbase/pocketbase:latest
    container_name: newsagg-pocketbase
    ports:
      - "${POCKETBASE_PORT:-8090}:8090"
    volumes:
      - pocketbase_data:/pb_data
    environment:
      - POCKETBASE_DATA_DIR=/pb_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - newsagg-net

  # Backend API - ASP.NET Core
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsagg-backend
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PocketBase__BaseUrl=http://pocketbase:8090
      - PocketBase__CollectionName=articles
    depends_on:
      pocketbase:
        condition: service_healthy
    volumes:
      - ./backend/NewsAggregator.Api:/app/src
    restart: unless-stopped
    networks:
      - newsagg-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend - React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsagg-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - newsagg-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Scraper - Python script runner
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: newsagg-scraper
    environment:
      - API_BASE_URL=http://backend:8080
      - SCRAPER_INTERVAL_MINUTES=${SCRAPER_INTERVAL_MINUTES:-30}
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - newsagg-net
    volumes:
      - ./scraper:/app/src

volumes:
  pocketbase_data:
    driver: local

networks:
  newsagg-net:
    driver: bridge
