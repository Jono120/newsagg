# Local development stack. Production Azure uses managed PostgreSQL and App Service / Functions (not the postgres service below).
services:
  postgres:
    image: postgres:17-alpine
    container_name: newsagg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsagg}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-newsagg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/NewsAggregator.Api/Dockerfile
    container_name: newsagg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__NewsAggregator: Host=postgres;Port=5432;Database=${POSTGRES_DB:-newsagg};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Scraper__PythonScriptPath: scraper/main.py
    ports:
      - "${BACKEND_PORT:-5000}:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: newsagg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: newsagg-scraper
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      API_BASE_URL: http://backend:8080
      API_ARTICLES_ENDPOINT: /api/articles
      SCRAPE_INTERVAL_MINUTES: ${SCRAPE_INTERVAL_MINUTES:-30}
      SCRAPE_EXTRACT_CONTENT: ${SCRAPE_EXTRACT_CONTENT:-1}
    command: ["python", "main.py", "--scheduled"]

volumes:
  postgres_data: