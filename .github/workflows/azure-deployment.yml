name: Azure Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: newsagg-production
    env:
      AZURE_ENV_NAME: newsagg-prod
      AZURE_LOCATION: newzealandnorth
      AZD_DEBUG_LOGGING: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v1

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set azd environment values
        shell: bash
        run: |
          azd env new "$AZURE_ENV_NAME" --no-prompt || azd env select "$AZURE_ENV_NAME"
          azd env set AZURE_LOCATION "$AZURE_LOCATION" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}" --no-prompt
          azd env config set infra.parameters.postgresAdminPassword "${{ secrets.POSTGRES_ADMIN_PASSWORD }}" --environment "$AZURE_ENV_NAME"
          azd env config set infra.parameters.postgresAdminUsername "${{ secrets.POSTGRES_ADMIN_USERNAME }}" --environment "$AZURE_ENV_NAME"
          azd env config set infra.parameters.prefix "${{ vars.AZD_PREFIX || 'newsagg' }}" --environment "$AZURE_ENV_NAME"

      - name: Provision and deploy
        shell: bash
        run: |
          azd up --environment "$AZURE_ENV_NAME" --no-prompt
