# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - newsagg-web

on:
  workflow_run:
    workflows:
      - Azure Deployment
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-newsagg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Publish API project
        run: dotnet publish backend/NewsAggregator.Api/NewsAggregator.Api.csproj -c Release -o ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_66485046BD9349D28AE9764C8A0D0C02 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7880779025AB4F18A1AB6BF80BBC7436 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_644B3FB5ACB9426CB84179043D136F2E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'newsagg-web'
          slot-name: 'Production'
          package: .
